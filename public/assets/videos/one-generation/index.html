<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>One generation - architecture diagram</title>
  </head>
  <body>
    <div
      id="one-generation"
      data-composition-id="one-generation"
      data-width="1600"
      data-height="560"
      data-start="0"
      data-duration="4"
      data-track-index="0"
    >
      <!-- connectors live behind the boxes; only these animate -->
      <svg class="wires" width="1600" height="560" viewBox="0 0 1600 560" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <marker id="ah-indigo" markerWidth="11" markerHeight="11" refX="9" refY="5" orient="auto" markerUnits="userSpaceOnUse">
            <path d="M0,0 L9,5 L0,10 Z" fill="#4f6ef7" />
          </marker>
          <marker id="ah-violet" markerWidth="11" markerHeight="11" refX="9" refY="5" orient="auto" markerUnits="userSpaceOnUse">
            <path d="M0,0 L9,5 L0,10 Z" fill="#7c5cff" />
          </marker>
          <marker id="ah-amber" markerWidth="11" markerHeight="11" refX="9" refY="5" orient="auto" markerUnits="userSpaceOnUse">
            <path d="M0,0 L9,5 L0,10 Z" fill="#e0892b" />
          </marker>
        </defs>

        <!-- main left-to-right flow -->
        <path class="flow" d="M250,280 L308,280" stroke="#4f6ef7" marker-end="url(#ah-indigo)" />
        <path class="flow" d="M514,280 L572,280" stroke="#4f6ef7" marker-end="url(#ah-indigo)" />
        <path class="flow" d="M778,280 L836,280" stroke="#4f6ef7" marker-end="url(#ah-indigo)" />
        <path class="flow" d="M1042,280 L1100,280" stroke="#4f6ef7" marker-end="url(#ah-indigo)" />
        <path class="flow" d="M1306,280 L1364,280" stroke="#4f6ef7" marker-end="url(#ah-indigo)" />

        <!-- retry feedback: Validate -> Generate -->
        <path class="flow" d="M1206,230 C1206,150 942,150 942,224" stroke="#e0892b" marker-end="url(#ah-amber)" />

        <!-- taste store -> Build prompt -->
        <path class="flow" d="M546,402 C546,360 678,372 678,336" stroke="#7c5cff" marker-end="url(#ah-violet)" />
      </svg>

      <!-- pipeline boxes -->
      <div class="box" style="left:50px;  top:230px; border-left-color:#94a3b8;">
        <div class="bt">Request</div><div class="bs">seed / chat turn</div>
      </div>
      <div class="box" style="left:314px; top:230px; border-left-color:#7c5cff;">
        <div class="bt">Retrieve taste</div><div class="bs">getTopKSimilar()</div>
      </div>
      <div class="box" style="left:578px; top:230px; border-left-color:#4f6ef7;">
        <div class="bt">Build prompt</div><div class="bs">priors + taste + axis</div>
      </div>
      <div class="box" style="left:842px; top:230px; border-left-color:#4338ca;">
        <div class="bt">Generate</div><div class="bs">Gemma E2B / 31B</div>
      </div>
      <div class="box" style="left:1106px; top:230px; border-left-color:#10b981;">
        <div class="bt">Validate</div><div class="bs">zod + acorn firewall</div>
      </div>
      <div class="box" style="left:1370px; top:230px; border-left-color:#e0892b;">
        <div class="bt">Play</div><div class="bs">Strudel &rarr; audio</div>
      </div>

      <!-- datastore -->
      <div class="store" style="left:431px; top:406px;">
        <div class="st">Taste memory</div><div class="ss">IndexedDB</div>
      </div>

      <!-- edge labels -->
      <div class="elabel" style="left:1028px; top:120px; color:#b45309;">retry &times;3</div>
      <div class="elabel" style="left:690px; top:360px; color:#6d28d9;">top-3</div>

      <style>
        @font-face {
          font-family: 'DM Sans';
          font-weight: 400 700;
          font-style: normal;
          font-display: swap;
          src: url('fonts/dmsans-latin.woff2') format('woff2');
        }
        #one-generation {
          position: absolute;
          inset: 0;
          background: #f5f7fa;
          overflow: hidden;
        }
        #one-generation * { box-sizing: border-box; }
        .wires { position: absolute; left: 0; top: 0; z-index: 1; }
        .flow {
          fill: none;
          stroke-width: 2.6;
          stroke-linecap: round;
          stroke-dasharray: 10 8;
          stroke-dashoffset: 0;
        }
        .box {
          position: absolute;
          width: 200px;
          height: 100px;
          z-index: 2;
          background: #ffffff;
          border: 1.5px solid #cdd5e0;
          border-left: 5px solid #94a3b8;
          border-radius: 11px;
          box-shadow: 0 2px 7px rgba(20, 30, 50, 0.07);
          display: flex;
          flex-direction: column;
          justify-content: center;
          align-items: center;
          gap: 9px;
          padding: 0 14px;
        }
        .bt { font-family: 'DM Sans', system-ui, sans-serif; font-weight: 600; font-size: 23px; color: #1f2a37; letter-spacing: -0.01em; }
        .bs { font-family: 'JetBrains Mono', monospace; font-weight: 400; font-size: 13.5px; color: #5b6470; text-align: center; }
        .store {
          position: absolute;
          width: 230px;
          height: 96px;
          z-index: 2;
          background: #f3f0ff;
          border: 2px solid #7c5cff;
          border-radius: 115px / 20px;
          display: flex;
          flex-direction: column;
          justify-content: center;
          align-items: center;
          gap: 5px;
          padding-top: 16px;
        }
        .store::before {
          content: '';
          position: absolute;
          top: -2px; left: -2px; right: -2px;
          height: 22px;
          background: #e9e3ff;
          border: 2px solid #7c5cff;
          border-radius: 50%;
        }
        .st { position: relative; z-index: 1; font-family: 'DM Sans', system-ui, sans-serif; font-weight: 600; font-size: 19px; color: #4c3bbf; }
        .ss { position: relative; z-index: 1; font-family: 'JetBrains Mono', monospace; font-size: 13px; color: #6d28d9; }
        .elabel { position: absolute; z-index: 3; font-family: 'JetBrains Mono', monospace; font-weight: 500; font-size: 15px; }
      </style>

      <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
      <script>
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });
        // one dash period (10 + 8) per second, linear, repeated to fill the
        // 4s loop - end state equals start state, so the GIF loops seamlessly.
        tl.to('.flow', { strokeDashoffset: -18, duration: 1, ease: 'none', repeat: 3 }, 0);
        window.__timelines['one-generation'] = tl;
      </script>
    </div>
  </body>
</html>
